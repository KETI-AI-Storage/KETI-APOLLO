# This rule is not used by the project orchestration-policy-engine itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over apollo.keti.re.kr.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: orchestration-policy-engine
    app.kubernetes.io/managed-by: kustomize
  name: orchestrationpolicy-admin-role
rules:
- apiGroups:
  - apollo.keti.re.kr
  resources:
  - orchestrationpolicies
  verbs:
  - '*'
- apiGroups:
  - apollo.keti.re.kr
  resources:
  - orchestrationpolicies/status
  verbs:
  - get
