###############################################################################
# MLOps Training + Inference Workload
# Purpose:
# - Apply workload YAML
# - Mutating Webhook automatically injects insight-trace sidecar
# - ai-storage-scheduler schedules workload
# - trace/scope/hub/forecaster/OPE/orchestrator 연결 검증
###############################################################################

apiVersion: v1
kind: Namespace
metadata:
  name: kubeflow-user-example-com
  labels:
    keti-ai-storage-injection: enabled
    mlops.keti.io/enabled: "true"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: resnet-mlops-training
  namespace: kubeflow-user-example-com
  labels:
    app: resnet-mlops-training
    workload.keti.io/type: training
    mlops.keti.io/enabled: "true"
    ai-model: resnet18
    framework: pytorch
    stage: training
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: resnet-mlops-training
        workload.keti.io/type: training
        mlops.keti.io/enabled: "true"
        ai-model: resnet18
        framework: pytorch
        stage: training
      annotations:
        mlops.keti.io/pipeline: "resnet-training-pipeline"
        mlops.keti.io/task: "image-classification"
        mlops.keti.io/dataset: "synthetic-image"
        mlops.keti.io/output-path: "/mlops/models/resnet18.pt"
        mlops.keti.io/metrics-path: "/mlops/metrics/metrics.json"
    spec:
      schedulerName: ai-storage-scheduler
      restartPolicy: Never

      containers:
        - name: training
          image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import os
              import json
              import time
              import sys

              sys.argv[0] = "resnet18_mlops_training.py"

              os.makedirs("/mlops/data", exist_ok=True)
              os.makedirs("/mlops/models", exist_ok=True)
              os.makedirs("/mlops/checkpoints", exist_ok=True)
              os.makedirs("/mlops/metrics", exist_ok=True)
              os.makedirs("/mlops/logs", exist_ok=True)

              print("=" * 70, flush=True)
              print("KETI AI Storage MLOps Training Workload", flush=True)
              print("Model: ResNet18", flush=True)
              print("Framework: PyTorch", flush=True)
              print("Task: Image Classification", flush=True)
              print("Sidecar: must be injected by webhook, not written in YAML", flush=True)
              print("=" * 70, flush=True)

              import torch
              import torch.nn as nn
              import torch.optim as optim

              class ResidualBlock(nn.Module):
                  def __init__(self, channels):
                      super().__init__()
                      self.conv1 = nn.Conv2d(channels, channels, kernel_size=3, padding=1)
                      self.bn1 = nn.BatchNorm2d(channels)
                      self.relu = nn.ReLU()
                      self.conv2 = nn.Conv2d(channels, channels, kernel_size=3, padding=1)
                      self.bn2 = nn.BatchNorm2d(channels)

                  def forward(self, x):
                      identity = x
                      out = self.relu(self.bn1(self.conv1(x)))
                      out = self.bn2(self.conv2(out))
                      out = out + identity
                      return self.relu(out)

              class TinyResNet(nn.Module):
                  def __init__(self, num_classes=10):
                      super().__init__()
                      self.stem = nn.Sequential(
                          nn.Conv2d(3, 32, kernel_size=3, padding=1),
                          nn.BatchNorm2d(32),
                          nn.ReLU()
                      )
                      self.block1 = ResidualBlock(32)
                      self.block2 = ResidualBlock(32)
                      self.pool = nn.AdaptiveAvgPool2d((1, 1))
                      self.fc = nn.Linear(32, num_classes)

                  def forward(self, x):
                      x = self.stem(x)
                      x = self.block1(x)
                      x = self.block2(x)
                      x = self.pool(x)
                      x = torch.flatten(x, 1)
                      return self.fc(x)

              device = "cuda" if torch.cuda.is_available() else "cpu"
              print(f"Device: {device}", flush=True)

              model = TinyResNet(num_classes=10).to(device)
              criterion = nn.CrossEntropyLoss()
              optimizer = optim.Adam(model.parameters(), lr=0.001)

              epochs = 5
              batches_per_epoch = 20
              batch_size = 16

              metrics = {
                  "pipeline": "resnet-training-pipeline",
                  "model": "resnet18-compatible",
                  "framework": "pytorch",
                  "task": "image-classification",
                  "epochs": epochs,
                  "batches_per_epoch": batches_per_epoch,
                  "device": device,
                  "history": []
              }

              for epoch in range(1, epochs + 1):
                  epoch_loss = 0.0
                  correct = 0
                  total = 0

                  print(f"[TRAIN] epoch={epoch}/{epochs}", flush=True)

                  for batch in range(1, batches_per_epoch + 1):
                      inputs = torch.randn(batch_size, 3, 64, 64).to(device)
                      labels = torch.randint(0, 10, (batch_size,)).to(device)

                      optimizer.zero_grad()
                      outputs = model(inputs)
                      loss = criterion(outputs, labels)
                      loss.backward()
                      optimizer.step()

                      epoch_loss += loss.item()
                      _, predicted = torch.max(outputs.data, 1)
                      total += labels.size(0)
                      correct += (predicted == labels).sum().item()

                      if batch % 5 == 0:
                          print(
                              f"[TRAIN] epoch={epoch} batch={batch} loss={loss.item():.4f}",
                              flush=True
                          )

                      time.sleep(1)

                  avg_loss = epoch_loss / batches_per_epoch
                  accuracy = correct / total

                  epoch_metrics = {
                      "epoch": epoch,
                      "loss": round(avg_loss, 6),
                      "accuracy": round(accuracy, 6)
                  }
                  metrics["history"].append(epoch_metrics)

                  checkpoint_path = f"/mlops/checkpoints/resnet_epoch_{epoch}.pt"
                  torch.save(model.state_dict(), checkpoint_path)

                  with open("/mlops/metrics/metrics.json", "w") as f:
                      json.dump(metrics, f, indent=2)

                  print(
                      f"[METRICS] epoch={epoch} loss={avg_loss:.4f} accuracy={accuracy:.4f}",
                      flush=True
                  )
                  print(f"[CHECKPOINT] saved={checkpoint_path}", flush=True)

              model_path = "/mlops/models/resnet18.pt"
              torch.save(model.state_dict(), model_path)

              metrics["status"] = "completed"
              metrics["model_path"] = model_path
              metrics["completed_at"] = int(time.time())

              with open("/mlops/metrics/metrics.json", "w") as f:
                  json.dump(metrics, f, indent=2)

              print("=" * 70, flush=True)
              print("[DONE] MLOps training completed", flush=True)
              print(f"[MODEL] {model_path}", flush=True)
              print("[METRICS] /mlops/metrics/metrics.json", flush=True)
              print("=" * 70, flush=True)

              time.sleep(120)

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: mlops-output
              mountPath: /mlops

      volumes:
        - name: mlops-output
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Namespace
metadata:
  name: ope-model-verify
  labels:
    keti-ai-storage-injection: enabled
    mlops.keti.io/enabled: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: resnet-inference-pvc
  namespace: ope-model-verify
  labels:
    app: resnet-inference
    workload.keti.io/type: inference
    mlops.keti.io/enabled: "true"
    ai-model: resnet18
    framework: pytorch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: nfs-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resnet-mlops-inference
  namespace: ope-model-verify
  labels:
    app: resnet-mlops-inference
    workload.keti.io/type: inference
    mlops.keti.io/enabled: "true"
    ai-model: resnet18
    framework: pytorch
    stage: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet-mlops-inference
  template:
    metadata:
      labels:
        app: resnet-mlops-inference
        workload.keti.io/type: inference
        mlops.keti.io/enabled: "true"
        ai-model: resnet18
        framework: pytorch
        stage: inference
      annotations:
        mlops.keti.io/pipeline: "resnet-inference-pipeline"
        mlops.keti.io/task: "image-classification"
        mlops.keti.io/model-path: "/data/models/resnet18.pt"
    spec:
      schedulerName: ai-storage-scheduler

      containers:
        - name: inference
          image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import os
              import time
              import sys
              import json

              sys.argv[0] = "resnet18_mlops_inference.py"

              os.makedirs("/data/models", exist_ok=True)
              os.makedirs("/data/metrics", exist_ok=True)

              print("=" * 70, flush=True)
              print("KETI AI Storage MLOps Inference Workload", flush=True)
              print("Model: ResNet18", flush=True)
              print("Framework: PyTorch", flush=True)
              print("Sidecar: must be injected by webhook, not written in YAML", flush=True)
              print("=" * 70, flush=True)

              import torch
              import torch.nn as nn

              class ResidualBlock(nn.Module):
                  def __init__(self, channels):
                      super().__init__()
                      self.conv1 = nn.Conv2d(channels, channels, kernel_size=3, padding=1)
                      self.bn1 = nn.BatchNorm2d(channels)
                      self.relu = nn.ReLU()
                      self.conv2 = nn.Conv2d(channels, channels, kernel_size=3, padding=1)
                      self.bn2 = nn.BatchNorm2d(channels)

                  def forward(self, x):
                      identity = x
                      out = self.relu(self.bn1(self.conv1(x)))
                      out = self.bn2(self.conv2(out))
                      out = out + identity
                      return self.relu(out)

              class TinyResNet(nn.Module):
                  def __init__(self, num_classes=10):
                      super().__init__()
                      self.stem = nn.Sequential(
                          nn.Conv2d(3, 32, kernel_size=3, padding=1),
                          nn.BatchNorm2d(32),
                          nn.ReLU()
                      )
                      self.block1 = ResidualBlock(32)
                      self.block2 = ResidualBlock(32)
                      self.pool = nn.AdaptiveAvgPool2d((1, 1))
                      self.fc = nn.Linear(32, num_classes)

                  def forward(self, x):
                      x = self.stem(x)
                      x = self.block1(x)
                      x = self.block2(x)
                      x = self.pool(x)
                      x = torch.flatten(x, 1)
                      return self.fc(x)

              device = "cuda" if torch.cuda.is_available() else "cpu"
              model = TinyResNet(num_classes=10).to(device)
              model.eval()

              count = 0

              while True:
                  count += 1
                  x = torch.randn(1, 3, 64, 64).to(device)

                  with torch.no_grad():
                      output = model(x)
                      pred = int(torch.argmax(output, dim=1).item())

                  metrics = {
                      "pipeline": "resnet-inference-pipeline",
                      "model": "resnet18-compatible",
                      "framework": "pytorch",
                      "task": "image-classification",
                      "request_count": count,
                      "prediction": pred,
                      "device": device,
                      "timestamp": int(time.time())
                  }

                  with open("/data/metrics/inference_metrics.json", "w") as f:
                      json.dump(metrics, f, indent=2)

                  print(f"[INFERENCE] request={count} prediction={pred}", flush=True)
                  time.sleep(10)

          resources:
            requests:
              cpu: "150m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: resnet-inference-pvc