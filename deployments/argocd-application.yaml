###############################################################################
# Argo CD Application for KETI APOLLO System
# AI Storage Scheduling Policy Engine with PPO
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keti-apollo-system
  namespace: argocd
  labels:
    project: keti-ai-storage
    component: apollo
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/KETI-AI-Storage/keti-platform.git
    targetRevision: main
    path: apollo/deployments

  destination:
    server: https://kubernetes.default.svc
    namespace: keti

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
