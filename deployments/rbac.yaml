# ============================================
# APOLLO RBAC Configuration
# ============================================
---
# Service Account for Policy Engines
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apollo-policy-engine
  namespace: apollo
---
# Service Account for Forecaster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apollo-forecaster
  namespace: apollo
---
# ClusterRole for Policy Engines
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apollo-policy-engine
rules:
# Pod and Node access
- apiGroups: [""]
  resources: ["pods", "nodes", "namespaces"]
  verbs: ["get", "list", "watch"]
# ReplicaSet: PolicyGenerator가 Pod→ReplicaSet→Deployment 이름 해석 시 namespaced Get만 사용 (캐시 list/watch 불필요)
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
# Metrics access
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
# Kueue access
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["workloads", "clusterqueues", "localqueues"]
  verbs: ["get", "list", "watch"]
# Events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# ConfigMaps for configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# OrchestrationPolicy CRD access
- apiGroups: ["apollo.keti.re.kr"]
  resources: ["orchestrationpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apollo.keti.re.kr"]
  resources: ["orchestrationpolicies/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["apollo.keti.re.kr"]
  resources: ["orchestrationpolicies/finalizers"]
  verbs: ["update"]
---
# ClusterRole for Forecaster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apollo-forecaster
rules:
# Node metrics
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes"]
  verbs: ["get", "list"]
# Node info
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# node-resource-forecaster: ClusterStateManager가 list_pod_for_all_namespaces로 Running Pod 집계
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list"]
---
# ClusterRoleBinding for Policy Engines
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apollo-policy-engine
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apollo-policy-engine
subjects:
- kind: ServiceAccount
  name: apollo-policy-engine
  namespace: apollo
---
# ClusterRoleBinding for Forecaster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apollo-forecaster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apollo-forecaster
subjects:
- kind: ServiceAccount
  name: apollo-forecaster
  namespace: apollo
