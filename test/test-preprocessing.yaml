# Test 1: Preprocessing workload (read-heavy, data locality important)
apiVersion: v1
kind: Pod
metadata:
  name: test-preprocessing
  namespace: default
  labels:
    app: apollo-test
    app.kubernetes.io/component: preprocessing
  annotations:
    apollo.ai-storage/workload-type: "preprocessing"
    apollo.ai-storage/io-pattern: "read_heavy"
    apollo.ai-storage/requires-gpu: "false"
    apollo.ai-storage/data-size-gb: "50"
    apollo.ai-storage/dataset-name: "imagenet"
spec:
  schedulerName: ai-storage-scheduler
  containers:
  - name: preprocessing
    image: busybox
    command: ["sh", "-c", "echo 'Preprocessing workload' && sleep 30"]
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
  restartPolicy: Never
